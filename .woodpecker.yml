when:
  - event: [pull_request, manual]

steps:
  - name: test
    image: php:8.1-cli
    environment:
      DEBIAN_FRONTEND: noninteractive
    commands:
      - apt-get update -qq && apt-get install -y -qq git unzip > /dev/null 2>&1
      - pecl install pcov > /dev/null 2>&1 && docker-php-ext-enable pcov
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - composer install --no-interaction --prefer-dist --quiet
      - vendor/bin/phpcs --standard=PSR12 src/
      - vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress
      - vendor/bin/phpunit --colors=always
      - echo "Infection (Mutation Testing)"
      - vendor/bin/infection --threads=4 --no-progress
